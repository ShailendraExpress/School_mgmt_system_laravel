version: '3.8'

services:
  app:
    build: .
    container_name: school_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - shared_code:/var/www  

  webserver:
    image: nginx:alpine
    container_name: school_nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    depends_on:
      - app
    volumes:
      - shared_code:/var/www  

  db:
    image: mysql:8.0
    container_name: school_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sms
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata:
  shared_code:  