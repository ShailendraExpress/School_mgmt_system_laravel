version: '3.8'

services:

  app:
    build: .
    container_name: school_app 
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: school_nginx
    ports:
      - "8083:80"
    depends_on:
      - app
    volumes:
      - .:/var/www   # 🔥 proper indentation
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  db:
    image: mysql:8.0
    container_name: school_db
    environment:
      MYSQL_DATABASE: sms
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: